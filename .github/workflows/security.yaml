name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"

jobs:
  # ── Dependency Scanning (Rust) ───────────────────────────────
  rust-audit:
    name: Rust Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo-audit
        run: |
          cargo install cargo-audit
          cargo audit --deny warnings
        working-directory: ./relay-server

  # ── Dependency Scanning (Go) ─────────────────────────────────
  go-audit:
    name: Go Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./rpc-proxy/...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: ./rpc-proxy

  # ── SAST (Static Application Security Testing) ───────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep ci --config=auto
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ── Container Scanning ───────────────────────────────────────
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build relay-server image
        run: |
          docker build -t relay-server:test -f deploy/docker/relay-server/Dockerfile .

      - name: Build rpc-proxy image
        run: |
          docker build -t rpc-proxy:test -f deploy/docker/rpc-proxy/Dockerfile .

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: relay-server:test
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Run Trivy scanner (rpc-proxy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rpc-proxy:test
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Upload SARIF report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: relay-server:test
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
