name: Build

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: onchainux

jobs:
  # ── Rust (Relay Server, Bundler) ──────────────────────────────
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: ./relay-server
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: ./relay-server
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: ./relay-server
        run: cargo test --workspace --all-features

      - name: Build
        working-directory: ./relay-server
        run: cargo build --release

  # ── Go (RPC Proxy) ───────────────────────────────────────────
  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ./rpc-proxy/go.sum

      - name: Download dependencies
        working-directory: ./rpc-proxy
        run: go mod download

      - name: Vet
        working-directory: ./rpc-proxy
        run: go vet ./...

      - name: Run tests
        working-directory: ./rpc-proxy
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./rpc-proxy/coverage.out

      - name: Build
        working-directory: ./rpc-proxy
        run: go build -ldflags="-s -w" -o bin/rpc-proxy ./cmd/rpc-proxy

  # ── TypeScript (SDK, UI) ─────────────────────────────────────
  ts-compile:
    name: TypeScript Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  # ── Docker Build & Push ──────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    needs: [rust-check, go-build, ts-compile]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: relay-server
            dockerfile: deploy/docker/relay-server/Dockerfile
            context: .
          - name: rpc-proxy
            dockerfile: deploy/docker/rpc-proxy/Dockerfile
            context: .
          - name: bundler
            dockerfile: deploy/docker/bundler/Dockerfile
            context: .
          - name: core-ui
            dockerfile: deploy/docker/core-ui/Dockerfile
            context: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
