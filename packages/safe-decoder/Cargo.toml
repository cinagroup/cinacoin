[package]
name = "safe-decoder"
version = "0.1.0"
edition = "2021"
description = "Decode Safe Core multisig transactions"
license = "MIT"

[dependencies]
clap = { version = "4", features = ["derive"] }
ethers = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"
anyhow = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"

[[bin]]
name = "safe-decoder"
path = "src/main.rs"
