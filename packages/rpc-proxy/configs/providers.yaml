# Provider Configuration Template
#
# Define the provider chain for each supported chain.
# Requests are routed: local_node → primary → fallbacks[0] → fallbacks[1]

# Ethereum Mainnet
ethereum:
  chain_id: 1
  local_node:
    url: "http://localhost:8545"
    timeout: "10s"
  primary:
    url: "https://eth-mainnet.g.alchemy.com/v2/YOUR_API_KEY"
    api_key: ""
    timeout: "15s"
  fallbacks:
    - url: "https://eth-mainnet.infura.io/v3/YOUR_API_KEY"
      api_key: ""
      timeout: "15s"
    - url: "https://rpc.ankr.com/eth"
      timeout: "20s"

# Polygon
polygon:
  chain_id: 137
  local_node:
    url: ""
  primary:
    url: "https://polygon-mainnet.g.alchemy.com/v2/YOUR_API_KEY"
    api_key: ""
    timeout: "15s"
  fallbacks:
    - url: "https://polygon-rpc.com"
      timeout: "20s"

# BSC
bsc:
  chain_id: 56
  local_node:
    url: ""
  primary:
    url: "https://bsc-dataseed.binance.org"
    timeout: "15s"
  fallbacks:
    - url: "https://rpc.ankr.com/bsc"
      timeout: "20s"
