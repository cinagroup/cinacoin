[package]
name = "onchainux-bundler"
version = "0.1.0"
edition = "2021"
description = "OnChainUX ERC-4337 Bundler — production UserOp bundling service"
license = "MIT"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
alloy-primitives = { version = "0.8", features = ["serde"] }
alloy-sol-types = "0.8"
alloy-rpc-types = "0.11"
alloy-transport = "0.11"
alloy-provider = { version = "0.11", features = ["reqwest"] }
alloy-signer = "0.11"
alloy-signer-local = "0.11"
alloy-network = "0.11"
alloy-contract = "0.11"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }
axum = "0.7"
thiserror = "2"
chrono = { version = "0.4", features = ["serde"] }
priority-queue = "2"
reqwest = { version = "0.12", features = ["json"] }
once_cell = "1"
async-trait = "0.1"
hex = "0.4"
url = "2"
jsonrpsee = { version = "0.24", features = ["server", "http-client"] }
