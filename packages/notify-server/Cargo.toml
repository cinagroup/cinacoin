[package]
name = "notify-server"
version = "0.1.0"
edition = "2021"
description = "CinaConnect Notification Server - dApp notification push system"
license = "MIT"

[dependencies]
axum = { version = "0.8", features = ["macros"] }
tokio = { version = "1", features = ["full"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "chrono", "uuid"] }
redis = { version = "0.29", features = ["tokio-comp", "connection_manager"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest = { version = "0.12", features = ["json"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
thiserror = "2"
jsonwebtoken = "9"
once_cell = "1"
prometheus = "0.14"
lazy_static = "1"

[dev-dependencies]
tokio-test = "0.4"
