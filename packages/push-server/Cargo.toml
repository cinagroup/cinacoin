[package]
name = "push-server"
version = "0.2.0"
edition = "2021"
description = "Unified push notification server for APNs and FCM – production grade"

[dependencies]
axum = { version = "0.7", features = ["macros"] }
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "http2"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tower = "0.5"
tower-http = { version = "0.5", features = ["trace", "cors", "limit", "request-id"] }
tower-layer = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
redis = { version = "0.27", features = ["tokio-comp", "connection-manager", "cluster"] }
jsonwebtoken = "9"
ring = "0.17"
chrono = { version = "0.4", features = ["serde"] }
prometheus = "0.13"
lazy_static = "1"
base64 = "0.22"
thiserror = "1"
moka = { version = "0.12", features = ["future"] }
uuid = { version = "1", features = ["v4"] }
