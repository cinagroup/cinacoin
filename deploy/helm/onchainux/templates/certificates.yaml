# TLS Certificate Management — internal service-to-service encryption
# Uses cert-manager with a self-signed CA for internal certificates
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: onchainux-ca
  labels:
    {{- include "onchainux.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: onchainux-ca-cert
  namespace: cert-manager
spec:
  isCA: true
  commonName: onchainux-ca
  secretName: onchainux-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: onchainux-ca
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: onchainux-ca-issuer
spec:
  ca:
    secretName: onchainux-ca-secret
---
# Internal certificate for service mesh communication
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: onchainux-internal-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: onchainux-internal-tls
  issuerRef:
    name: onchainux-ca-issuer
    kind: ClusterIssuer
  commonName: "*.onchainux.svc.cluster.local"
  dnsNames:
    - "*.onchainux.svc.cluster.local"
    - "*.onchainux.svc"
    - "*.onchainux"
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
