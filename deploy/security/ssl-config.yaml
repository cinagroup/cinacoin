# OnChainUX — SSL/TLS Configuration
# Production-grade TLS settings for all ingress points
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@onchainux.com
    privateKeySecretRef:
      name: letsencrypt-prod-private-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ops@onchainux.com
    privateKeySecretRef:
      name: letsencrypt-staging-private-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# Certificate for production domains
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: onchainux-wildcard
  namespace: onchainux
spec:
  secretName: onchainux-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.onchainux.com"
  dnsNames:
    - onchainux.com
    - "*.onchainux.com"
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - digital signature
    - key encipherment
---
# Certificate for internal services
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: onchainux-internal
  namespace: onchainux
spec:
  secretName: onchainux-internal-tls
  issuerRef:
    name: onchainux-ca
    kind: ClusterIssuer
  commonName: "*.onchainux.svc.cluster.local"
  dnsNames:
    - "*.onchainux.svc.cluster.local"
    - "*.onchainux.svc"
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
