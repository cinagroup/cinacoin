# RPC Provider Configuration
# Used by rpc-proxy to route requests to optimal providers

providers:
  - name: alchemy
    priority: 1
    chain_ids: [1, 137, 10, 8453, 42161]
    rpc_url: "https://{chain}.g.alchemy.com/v2/{api_key}"
    ws_url: "wss://{chain}.g.alchemy.com/v2/{api_key}"
    rate_limit: 300
    weight: 40

  - name: infura
    priority: 2
    chain_ids: [1, 137, 10, 8453, 42161]
    rpc_url: "https://{chain}.infura.io/v3/{api_key}"
    ws_url: "wss://{chain}.infura.io/v3/{api_key}"
    rate_limit: 200
    weight: 30

  - name: ankr
    priority: 3
    chain_ids: [1, 137, 56, 43114]
    rpc_url: "https://rpc.ankr.com/{chain}/{api_key}"
    ws_url: "wss://rpc.ankr.com/{chain}/ws/{api_key}"
    rate_limit: 150
    weight: 20

  - name: local
    priority: 0
    chain_ids: [1, 137]
    rpc_url: "http://erigon-ethereum:8545"
    ws_url: "ws://erigon-ethereum:8546"
    rate_limit: 10000
    weight: 10

cache:
  enabled: true
  methods:
    - eth_blockNumber
    - eth_getBalance
    - eth_getTransactionCount
    - eth_getTransactionReceipt
    - eth_getBlockByNumber
    - eth_getBlockByHash
    - eth_call
  default_ttl: 12s
  max_size: 100000

health_check:
  interval: 30s
  timeout: 10s
  method:
    jsonrpc: "2.0"
    method: eth_blockNumber
    params: []
    id: 1
